<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KCR 2026 Survey</title>
<style>
  /* ── reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
         background: #F2F2F7; color: #1C1C1E; min-height: 100vh; }

  /* ── layout ── */
  .phone { max-width: 430px; margin: 0 auto; background: #F2F2F7; min-height: 100vh; padding-bottom: 32px; }
  .topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1);
            padding: 14px 16px; display: flex; align-items: center; gap: 10px;
            position: sticky; top: 0; z-index: 10;
            margin: 0 16px; border-radius: 0 0 12px 12px; }
  .topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
           background: #E6F1FB; color: #185FA5; }

  /* ── key visual ── */
  .kv-wrap { margin: 12px 16px 0; overflow: hidden; border-radius: 12px; }
  .kv-wrap img { width: 100%; display: block; }

  /* ── progress ── */
  .steps { display: flex; gap: 5px; padding: 12px 16px 0; }
  .step { flex: 1; height: 3px; border-radius: 2px; background: #E5E5EA; }
  .step.done { background: #34C759; }
  .step.active { background: #185FA5; }

  /* ── content ── */
  .content { padding: 12px 16px; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.08);
          padding: 14px 16px; margin-bottom: 10px; }
  .card-label { font-size: 11px; font-weight: 600; color: #8E8E93;
                letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }

  /* ── form elements ── */
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 15px; color: #3A3A3C; margin-bottom: 5px; font-weight: 500; }
  .req { color: #FF3B30; }
  input[type=text], input[type=email], input[type=tel], textarea {
    width: 100%; padding: 10px 12px; border: 0.5px solid #E5E5EA; border-radius: 8px;
    font-size: 15px; font-family: inherit; background: #F9F9F9; color: #1C1C1E;
    outline: none; transition: border-color .15s; -webkit-appearance: none; }
  input:focus, textarea:focus { border-color: #185FA5; background: #fff; }
  textarea { resize: none; line-height: 1.5; }
  .field-hint { font-size: 11px; color: #8E8E93; margin-top: 3px; }

  /* ── chips ── */
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 8px 14px; border: 0.5px solid #E5E5EA; border-radius: 20px;
          font-size: 13px; color: #8E8E93; cursor: pointer; background: #fff;
          transition: all .15s; white-space: nowrap; }
  .chip.on { background: #185FA5; border-color: #185FA5; color: #fff; font-weight: 600; }

  /* ── checkbox (multi-select) ── */
  .check-group { display: flex; flex-direction: column; gap: 5px; }
  .check-item { display: flex; align-items: center; gap: 9px; padding: 10px 12px;
                border: 0.5px solid #E5E5EA; border-radius: 8px; cursor: pointer;
                font-size: 14px; color: #8E8E93; transition: all .15s; background: #fff; }
  .check-item:hover { background: #F2F2F7; }
  .check-item.on { border-color: #185FA5; background: #E6F1FB; color: #3A3A3C; }
  .check-box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #C7C7CC;
               flex-shrink: 0; display: flex; align-items: center; justify-content: center;
               font-size: 12px; color: transparent; transition: all .15s; }
  .check-item.on .check-box { border-color: #185FA5; background: #185FA5; color: #fff; }

  /* ── consent ── */
  .consent-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px;
                 background: #F9F9F9; border-radius: 8px; cursor: pointer; }
  .consent-box { width: 20px; height: 20px; border-radius: 4px; border: 1.5px solid #C7C7CC;
                 flex-shrink: 0; display: flex; align-items: center; justify-content: center;
                 font-size: 14px; color: transparent; margin-top: 1px; transition: all .15s; }
  .consent-row.on .consent-box { border-color: #185FA5; background: #185FA5; color: #fff; }
  .consent-text { font-size: 13px; color: #1C1C1E; line-height: 1.5; }

  /* ── buttons ── */
  .btn-primary { width: 100%; padding: 14px; background: #185FA5; color: #fff;
                 border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
                 cursor: pointer; margin-top: 4px; font-family: inherit; transition: background .15s; }
  .btn-primary:hover { background: #0C447C; }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
  .btn-nav { display: flex; gap: 8px; margin-top: 4px; }
  .btn-back { flex: 1; padding: 14px; background: #fff; color: #8E8E93;
              border: 0.5px solid #E5E5EA; border-radius: 12px; font-size: 15px; font-weight: 500;
              cursor: pointer; font-family: inherit; text-align: center; }
  .btn-next { flex: 2; padding: 14px; background: #185FA5; color: #fff;
              border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
              cursor: pointer; font-family: inherit; transition: background .15s; }
  .btn-next:hover { background: #0C447C; }

  /* ── success ── */
  .success-wrap { text-align: center; padding: 28px 16px; }
  .ok-circle { width: 60px; height: 60px; border-radius: 50%; background: #D1F2E0;
               display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }

  /* ── loading overlay ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
             align-items: center; justify-content: center; z-index: 100; }
  .overlay.show { display: flex; }
  .spinner-box { background: #fff; border-radius: 16px; padding: 28px 32px;
                 text-align: center; min-width: 160px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #E5E5EA;
             border-top-color: #185FA5; border-radius: 50%;
             animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { font-size: 14px; color: #8E8E93; }

  /* ── error toast ── */
  .toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
           background: #FF3B30; color: #fff; padding: 10px 20px; border-radius: 20px;
           font-size: 14px; font-weight: 600; z-index: 200; white-space: nowrap; }
  .toast.show { display: block; }

  /* ── language toggle ── */
  .lang-toggle { display: flex; border: 1px solid #E5E5EA; border-radius: 14px; overflow: hidden; }
  .lang-btn { padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
              background: #fff; color: #8E8E93; border: none; font-family: inherit; transition: all .15s; }
  .lang-btn.on { background: #185FA5; color: #fff; }

  /* ── likert 5-point scale ── */
  .likert-wrap { margin-top: 6px; }
  .likert-group { display: flex; justify-content: space-between; gap: 6px; }
  .likert-item { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid #E5E5EA;
                 background: #fff; display: flex; align-items: center; justify-content: center;
                 font-size: 15px; font-weight: 600; color: #8E8E93; cursor: pointer; transition: all .15s; }
  .likert-item.on { background: #185FA5; border-color: #185FA5; color: #fff; }
  .likert-labels { display: flex; justify-content: space-between; font-size: 11px; color: #8E8E93; margin-top: 4px; padding: 0 4px; }

  /* ── sub-item likert rows (matrix) ── */
  .subitem-row { padding: 10px 0; border-bottom: 0.5px solid #F2F2F7; }
  .subitem-row:last-child { border-bottom: none; }
  .subitem-label { font-size: 13px; color: #3A3A3C; font-weight: 500; margin-bottom: 6px; }
  .subitem-row .likert-group { gap: 4px; }
  .subitem-row .likert-item { width: 40px; height: 40px; font-size: 14px; }

  /* ── start screen type cards ── */
  .type-cards { display: flex; gap: 12px; margin-top: 16px; }
  .type-card { flex: 1; padding: 28px 16px; border-radius: 12px; border: 1.5px solid #E5E5EA;
               cursor: pointer; text-align: center; transition: all .15s; background: #fff; }
  .type-card:hover { border-color: #185FA5; }
  .type-card.on { border-color: #185FA5; background: #E6F1FB; }
  .type-card .icon { font-size: 36px; margin-bottom: 10px; }
  .type-card .label { font-size: 16px; font-weight: 600; color: #1C1C1E; margin-bottom: 4px; }
  .type-card .sub { font-size: 12px; color: #8E8E93; }

  /* ── prize info box ── */
  .prize-info { background: #E6F1FB; border-radius: 10px; padding: 12px 14px;
                font-size: 13px; color: #0C447C; line-height: 1.6; margin-bottom: 10px; }
</style>
</head>

// ============================================================
// Utilities
// ============================================================
const g = id => document.getElementById(id);
function t(k) { return T[k]?.[S.lang] || T[k]?.ko || k; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function showOverlay(on) {
  g('overlay').classList.toggle('show', on);
  g('spinner-msg').textContent = t('submitting');
}
function showToast(msg) {
  const el = g('toast'); el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function stepsHTML(total, current) {
  return '<div class="steps">' + Array.from({length: total}, (_, i) => {
    const idx = i + 1;
    return '<div class="step ' + (idx < current ? 'done' : idx === current ? 'active' : '') + '"></div>';
  }).join('') + '</div>';
}
function formatPhone(v) {
  const n = v.replace(/[^0-9]/g,'').slice(0,11);
  if (n.length <= 3) return n;
  if (n.length <= 7) return n.slice(0,3)+'-'+n.slice(3);
  return n.slice(0,3)+'-'+n.slice(3,7)+'-'+n.slice(7);
}
function likertHTML(key, val, lo, hi) {
  let h = '<div class="likert-wrap"><div class="likert-group">';
  for (let i = 1; i <= 5; i++)
    h += '<div class="likert-item '+(val===i?'on':'')+'" data-likert="'+key+'" data-val="'+i+'">'+i+'</div>';
  h += '</div><div class="likert-labels"><span>'+lo+'</span><span>'+hi+'</span></div></div>';
  return h;
}
function subLikertHTML(key, label, val) {
  let h = '<div class="subitem-row"><div class="subitem-label">'+label+'</div>';
  h += '<div class="likert-group">';
  for (let i = 1; i <= 5; i++)
    h += '<div class="likert-item '+(val===i?'on':'')+'" data-likert="'+key+'" data-val="'+i+'">'+i+'</div>';
  h += '</div></div>';
  return h;
}

function topbarHTML() {
  const langToggle = S.step === 0 ? `
    <div class="lang-toggle">
      <button class="lang-btn ${S.lang==='ko'?'on':''}" data-lang="ko">KO</button>
      <button class="lang-btn ${S.lang==='en'?'on':''}" data-lang="en">EN</button>
    </div>` : '';
  return `<div class="topbar">
    <div class="topbar-title">${t('app_title')}</div>
    ${langToggle}
    <span class="badge">KCR 2026</span>
  </div>`;
}

// ── localStorage ──
function checkSubmitted() {
  try { const d = localStorage.getItem('kcr2026_survey_submitted'); if (d) return JSON.parse(d); } catch(e) {}
  return null;
}
function markSubmitted(ts) {
  localStorage.setItem('kcr2026_survey_submitted', JSON.stringify({ ts: ts || new Date().toISOString(), respondent: S.respondent, prizeClaimed: false }));
}
function markPrizeClaimed() {
  try {
    const d = JSON.parse(localStorage.getItem('kcr2026_survey_submitted') || '{}');
    d.prizeClaimed = true;
    localStorage.setItem('kcr2026_survey_submitted', JSON.stringify(d));
  } catch(e) {}
}

// ============================================================
// Init
// ============================================================
window.onload = () => {
  const prev = checkSubmitted();
  if (prev) {
    S.submitted     = true;
    S.respondent    = prev.respondent   || '';
    S.submittedTs   = prev.ts           || '';
    S.prizeClaimed  = prev.prizeClaimed || false;
  }
  if (!GAS) { g('setup-screen').style.display = 'block'; }
  else { g('main-app').style.display = 'block'; render(); }
};
function applyTempUrl() {
  const url = g('temp-url').value.trim();
  if (!url.startsWith('https://script.google.com')) { showToast('Enter a valid Apps Script URL'); return; }
  GAS = url;
  g('setup-screen').style.display = 'none';
  g('main-app').style.display = 'block';
  render();
}

// ============================================================
// Render
// ============================================================
function render() {
  const view = S.submitted ? 'success' : 'step' + S.step;
  g('app').innerHTML = VIEWS[view]();
  bindEvents();
  window.scrollTo(0, 0);
}

// ============================================================
// Save text inputs
// ============================================================
function saveInputs() {
  const v = id => { const el = g(id); return el ? el.value.trim() : null; };
  if (S.step === 4) { const x = v('i-q14'); if (x !== null) S.q14 = x; }
  if (S.step === 6) { const x = v('i-q23'); if (x !== null) S.q23 = x; }
  if (S.step === 7) {
    const x = v('i-q27'); if (x !== null) S.q27 = x;
    const n = v('i-prize-name'); if (n !== null) S.prize_name = n;
    const p = v('i-prize-phone'); if (p !== null) S.prize_phone = p;
  }
}

// ============================================================
// Validation
// ============================================================
function validate(step) {
  switch(step) {
    case 0:
      if (!S.respondent) { showToast(t('v_respondent')); return false; }
      return true;
    case 1:
      if (!S.q1) { showToast(t('v_q1')); return false; }
      if (!S.q2) { showToast(t('v_q2')); return false; }
      if (!S.q3) { showToast(t('v_q3')); return false; }
      if (!S.q4) { showToast(t('v_q4')); return false; }
      if (!S.q5) { showToast(t('v_q5')); return false; }
      return true;
    case 2:
      if (!S.q6) { showToast(t('v_q6')); return false; }
      if (!S.q7.length) { showToast(t('v_q7')); return false; }
      if (!S.q8) { showToast(t('v_q8')); return false; }
      return true;
    case 3:
      if (!S.q9_1 || !S.q9_2 || !S.q9_3 || !S.q9_4 || !S.q9_5) { showToast(t('v_q9')); return false; }
      if (!S.q10) { showToast(t('v_q10')); return false; }
      return true;
    case 4:
      if (!S.q11) { showToast(t('v_q11')); return false; }
      if (!S.q12) { showToast(t('v_q12')); return false; }
      if (!S.q13) { showToast(t('v_q13')); return false; }
      return true;
    case 5:
      if (!S.q15 || !S.q16 || !S.q17 || !S.q18 || !S.q19 || !S.q20) { showToast(t('v_q1520')); return false; }
      return true;
    case 6:
      if (!S.q21) { showToast(t('v_q21')); return false; }
      if (!S.q22) { showToast(t('v_q22')); return false; }
      return true;
    case 7:
      if (!S.q24) { showToast(t('v_q24')); return false; }
      if (!S.q25) { showToast(t('v_q25')); return false; }
      if (!S.q26) { showToast(t('v_q26')); return false; }
      if (!S.prize_name.trim()) { showToast(t('v_prize_name')); return false; }
      if (S.respondent === 'domestic' && !S.prize_phone.trim()) { showToast(t('v_prize_phone')); return false; }
      if (!S.privacy) { showToast(t('v_privacy')); return false; }
      return true;
  }
  return true;
}

// ============================================================
// Event Binding
// ============================================================
function bindEvents() {
  // Language toggle
  document.querySelectorAll('[data-lang]').forEach(el => {
    el.onclick = () => { S.lang = el.dataset.lang; render(); };
  });

  // Navigation
  const btnNext = g('btn-next');
  if (btnNext) btnNext.onclick = () => { saveInputs(); if (validate(S.step)) { S.step++; render(); } };
  const btnPrev = g('btn-prev');
  if (btnPrev) btnPrev.onclick = () => { saveInputs(); S.step--; render(); };

  // Submit
  const btnSubmit = g('btn-submit');
  if (btnSubmit) btnSubmit.onclick = () => { saveInputs(); if (validate(7)) submitSurvey(); };

  // New survey
  const btnNew = g('btn-new');
  if (btnNew) btnNew.onclick = () => {
    localStorage.removeItem('kcr2026_survey_submitted');
    S = { step: 0, lang: 'ko', respondent: '',
      q1:'', q2:'', q3:'', q4:0, q5:'',
      q6:'', q7:[], q8:0,
      q9_1:0, q9_2:0, q9_3:0, q9_4:0, q9_5:0, q10:0,
      q11:'', q12:'', q13:0, q14:'',
      q15:0, q16:0, q17:0, q18:0, q19:0, q20:0,
      q21:0, q22:0, q23:'',
      q24:'', q25:0, q26:0, q27:'',
      prize_name:'', prize_phone:'',
      privacy: false, submitted: false, submittedTs: '', prizeClaimed: false };
    render();
  };

  // 기념품 수령 버튼 (해외 전용)
  const btnClaim = g('btn-claim');
  if (btnClaim) btnClaim.onclick = () => {
    const modal = g('pin-modal');
    if (modal) { modal.style.display = 'flex'; const pi = g('pin-input'); if (pi) { pi.value=''; pi.focus(); } }
  };
  const pinCancel = g('pin-cancel');
  if (pinCancel) pinCancel.onclick = () => { const m = g('pin-modal'); if (m) m.style.display = 'none'; };
  const pinConfirm = g('pin-confirm');
  if (pinConfirm) pinConfirm.onclick = () => claimPrize();
  const pinInput = g('pin-input');
  if (pinInput) pinInput.onkeydown = e => { if (e.key === 'Enter') claimPrize(); };

  // Step 0: respondent type
  document.querySelectorAll('[data-resp]').forEach(el => {
    el.onclick = () => {
      S.respondent = el.dataset.resp;
      S.lang = S.respondent === 'foreign' ? 'en' : 'ko';
      render();
    };
  });

  // Q1 chips
  document.querySelectorAll('[data-q1]').forEach(el => { el.onclick = () => { S.q1 = el.dataset.q1; render(); }; });
  document.querySelectorAll('[data-q2]').forEach(el => { el.onclick = () => { S.q2 = el.dataset.q2; render(); }; });
  document.querySelectorAll('[data-q3]').forEach(el => { el.onclick = () => { S.q3 = el.dataset.q3; render(); }; });
  document.querySelectorAll('[data-q5]').forEach(el => { el.onclick = () => { S.q5 = el.dataset.q5; render(); }; });
  document.querySelectorAll('[data-q6]').forEach(el => { el.onclick = () => { S.q6 = el.dataset.q6; render(); }; });
  document.querySelectorAll('[data-q11]').forEach(el => { el.onclick = () => { S.q11 = el.dataset.q11; render(); }; });
  document.querySelectorAll('[data-q12]').forEach(el => { el.onclick = () => { S.q12 = el.dataset.q12; render(); }; });
  document.querySelectorAll('[data-q24]').forEach(el => { el.onclick = () => { S.q24 = el.dataset.q24; render(); }; });

  // Q7 checkboxes
  document.querySelectorAll('[data-q7]').forEach(el => {
    el.onclick = () => {
      const v = el.dataset.q7;
      const idx = S.q7.indexOf(v);
      if (idx >= 0) S.q7.splice(idx, 1); else S.q7.push(v);
      render();
    };
  });

  // Likert (all)
  document.querySelectorAll('[data-likert]').forEach(el => {
    el.onclick = () => { S[el.dataset.likert] = parseInt(el.dataset.val); render(); };
  });

  // Consent
  const consent = g('consent-toggle');
  if (consent) consent.onclick = () => { saveInputs(); S.privacy = !S.privacy; render(); };

  // Phone formatting
  const phoneEl = g('i-prize-phone');
  if (phoneEl) phoneEl.oninput = () => { phoneEl.value = formatPhone(phoneEl.value); };
}

// ============================================================
// Resolve stored keys to Korean labels for spreadsheet
// ============================================================
function resolveQ1(key) {
  const map = { prof:'대학교수', spec:'전문의', fell:'전임의', res:'전공의', nurse:'간호사', rsch:'연구원', stud:'학생', corp:'기업관계자', etc:'기타' };
  return map[key] || key;
}
function resolveQ2(key) {
  const map = { '1':'처음', '2':'2-3회', '3':'4-5회', '4':'6회 이상' };
  return map[key] || key;
}
function resolveQ3(key) {
  const map = { news:'학회홈페이지', web:'이메일', peer:'동료권유', etc:'기타' };
  return map[key] || key;
}
function resolveQ6(key) {
  const map = { yes:'예', no:'아니오', none:'몰랐음' };
  return map[key] || key;
}
function resolveQ7(arr) {
  const map = { screen:'스크린자막', text:'APP텍스트', voice:'APP음성', etc:'기타' };
  return arr.map(k => map[k]||k).join(', ');
}
function resolveQ11(key) {
  const map = { '5':'매우만족', '4':'만족', '3':'보통', '2':'불만족', '1':'매우불만족' };
  return map[key] || key;
}
function resolveQ12(key) {
  const map = { screen:'스크린자막', app:'전용APP', voice:'음성번역', both:'병행사용' };
  return map[key] || key;
}
function resolveQ24(key) {
  const map = { yes:'예', no:'아니오', tbd:'미정' };
  return map[key] || key;
}

// ============================================================
// Submit
// ============================================================
async function submitSurvey() {
  showOverlay(true);
  const payload = {
    type: 'survey',
    timestamp: new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' }),
    respondent: S.respondent,
    lang: S.lang,
    q1: resolveQ1(S.q1),
    q2: resolveQ2(S.q2),
    q3: resolveQ3(S.q3),
    q4: S.q4 || '',
    q5: S.q5 === 'yes' ? '예' : S.q5 === 'no' ? '아니오' : '',
    q6: resolveQ6(S.q6),
    q7: resolveQ7(S.q7),
    q8: S.q8 || '',
    q9_1: S.q9_1 || '', q9_2: S.q9_2 || '', q9_3: S.q9_3 || '', q9_4: S.q9_4 || '', q9_5: S.q9_5 || '',
    q10: S.q10 || '',
    q11: resolveQ11(S.q11),
    q12: resolveQ12(S.q12),
    q13: S.q13 || '',
    q14: S.q14,
    q15: S.q15 || '', q16: S.q16 || '', q17: S.q17 || '', q18: S.q18 || '', q19: S.q19 || '', q20: S.q20 || '',
    q21: S.q21 || '', q22: S.q22 || '',
    q23: S.q23,
    q24: resolveQ24(S.q24),
    q25: S.q25 || '', q26: S.q26 || '',
    q27: S.q27,
    prize_name: S.prize_name,
    prize_phone: S.prize_phone,
    prize_type: S.respondent === 'domestic' ? '추첨' : '키링수령'
  };

  try {
    let submittedTs = payload.timestamp;
    try {
      const res  = await fetch(GAS, {
        method: 'POST', mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.ts) submittedTs = json.ts;
    } catch(_) {
      // CORS 실패 시 no-cors 폴백 (응답 읽기 불가)
      await fetch(GAS, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
    }
    S.submittedTs = submittedTs;
    markSubmitted(submittedTs);
    S.submitted = true;
    showOverlay(false);
    render();
  } catch(e) {
    showOverlay(false);
    showToast(t('submit_error'));
  }
}

// ── 기념품 수령 처리 (해외 전용, 직원 PIN 확인) ──────────────
const STAFF_PIN = '4025';

async function claimPrize() {
  const pin = (g('pin-input') ? g('pin-input').value : '').trim();
  if (pin !== STAFF_PIN) { showToast('PIN이 올바르지 않습니다'); return; }

  g('pin-modal').style.display = 'none';
  showOverlay(true);
  g('spinner-msg').textContent = '처리 중...';

  try {
    const payload = {
      type: 'prize_claim',
      ts:   S.submittedTs,
      name: S.prize_name
    };
    let result = { status: 'ok' };
    try {
      const res = await fetch(GAS, {
        method: 'POST', mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      result = await res.json();
    } catch(_) {
      await fetch(GAS, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
    }

    showOverlay(false);
    if (result.status === 'already_claimed') {
      showToast('이미 수령 처리된 응답입니다');
    } else {
      S.prizeClaimed = true;
      markPrizeClaimed();
      render();
    }
  } catch(e) {
    showOverlay(false);
    showToast('처리 중 오류가 발생했습니다');
  }
}
